x-app-common: &app-common
  restart: always
  image: "solidtime/solidtime:${SOLIDTIME_IMAGE_TAG:-latest}"
  user: "1000:1000"
  networks:
    - internal
  volumes:
    - "app-storage:/var/www/html/storage"
    - "./logs:/var/www/html/storage/logs"
    - "./app-storage:/var/www/html/storage/app"
  env_file:
    - laravel.env

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 3

services:
  app:
    <<: *app-common
    ports:
      - '${FORWARD_APP_PORT:-8000}:8000'
    environment:
      CONTAINER_MODE: http
      AUTO_DB_MIGRATE: "true"
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "--fail", "http://localhost:8000/health-check/up"]
      start_period: 20s
    depends_on:
      database:
        condition: service_healthy

  scheduler:
    <<: *app-common
    environment:
      CONTAINER_MODE: scheduler
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "healthcheck"]
      start_period: 15s
    depends_on:
      database:
        condition: service_healthy

  queue:
    <<: *app-common
    environment:
      CONTAINER_MODE: worker
      WORKER_COMMAND: "php /var/www/html/artisan queue:work"
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "healthcheck"]
      start_period: 15s
    depends_on:
      database:
        condition: service_healthy

  database:
    restart: always
    image: "postgres:15"
    environment:
      POSTGRES_DB: "${DB_DATABASE}"
      POSTGRES_USER: "${DB_USERNAME}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - "database-storage:/var/lib/postgresql/data"
    networks:
      - internal
    healthcheck:
      test:
        - CMD
        - pg_isready
        - "-q"
        - "-d"
        - "${DB_DATABASE}"
        - "-U"
        - "${DB_USERNAME}"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  gotenberg:
    restart: always
    image: gotenberg/gotenberg:8
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "--silent", "--fail", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  internal:

volumes:
  database-storage:
  app-storage:
